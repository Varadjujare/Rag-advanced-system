services:
  - type: web
    name: smartdoc
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 300 --workers 1 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: GOOGLE_API_CORE_SUPPRESS_PYTHON_VERSION_WARNING
        value: "1"
